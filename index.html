<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Poop in a Scoop</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage">
  <div id="hud">
    <div class="stack-left">
      <div class="gauge-row">
        <div id="gauge-wrap">
          <div id="gauge" aria-label="Wave progress">
            <svg viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="50"/>
              <circle class="ring-fill" cx="60" cy="60" r="50" pathLength="100"/>
            </svg>
            <div class="wave-num">1</div>
          </div>
        </div>
      </div>
      <div id="combo"></div>
    </div>
    <div class="panel" id="health-panel">
      <div id="health-track"><div id="health-fill"></div></div>
      <div id="score">0</div>
    </div>
  </div>

  <div id="screen-flash"></div>

  <canvas id="game"></canvas>

  <button id="debugBtn">🐞 Debug</button>
  <div id="debugPanel" class="hidden">
    <div class="debug-modal">
      <h2>🐞 Debug <span class="debug-paused">(paused)</span></h2>

      <div class="debug-top">
        <div class="debug-wave">
          <label>Wave: <input type="number" id="debugWaveInput" min="1" value="1" /></label>
          <button id="debugWaveJump">Jump</button>
        </div>
        <div class="debug-time">
          <label>Time of day: <span id="debugTimeLabel">0%</span></label>
          <input type="range" id="debugTimeSlider" min="0" max="0.999" step="0.01" value="0" />
        </div>
      </div>

      <details class="debug-section" open>
        <summary>Game mode</summary>
        <div class="debug-section-body">
          <label class="debug-field">Mode:
            <select id="debugGameMode">
              <option value="auto">Auto Trigger</option>
              <option value="banked">Banked Inventory</option>
              <option value="tipping">Tipping (no bubbles)</option>
            </select>
          </label>
          <label class="debug-row">
            <input type="checkbox" id="debugStoreToggle" />
            <span>Show between-wave store (loot box)</span>
          </label>
        </div>
      </details>

      <details class="debug-section">
        <summary>Gameplay</summary>
        <div class="debug-section-body">
          <label class="debug-field">Delivery:
            <select id="debugDelivery">
              <option value="any">Any order, 1 at a time</option>
              <option value="sequential">Exact order, 1 at a time</option>
              <option value="whole">Whole cone, exact match</option>
            </select>
          </label>
          <div class="debug-slider">
            <label>Max scoops on cone: <span id="debugMaxStackLabel">6</span></label>
            <input type="range" id="debugMaxStack" min="1" max="12" step="1" value="6" />
          </div>
          <div class="debug-slider">
            <label>Max falling scoops: <span id="debugMaxLiveLabel">7</span></label>
            <input type="range" id="debugMaxLive" min="1" max="15" step="1" value="7" />
          </div>
          <div class="debug-slider">
            <label>Scoop spawn interval (s): <span id="debugSpawnIntervalLabel">0.85</span></label>
            <input type="range" id="debugSpawnInterval" min="0.2" max="2" step="0.05" value="0.85" />
          </div>
          <div class="debug-slider">
            <label>Relative drag force: <span id="debugDragGainLabel">2.0</span></label>
            <input type="range" id="debugDragGain" min="0.5" max="5" step="0.1" value="2.0" />
          </div>
          <div class="debug-slider">
            <label>Combo breaker threshold (Tipping): <span id="debugComboBreakerLabel">8</span></label>
            <input type="range" id="debugComboBreaker" min="3" max="15" step="1" value="8" />
          </div>
        </div>
      </details>

      <details class="debug-section">
        <summary>Cheats</summary>
        <div class="debug-section-body">
          <label class="debug-row"><input type="checkbox" data-flag="pickupKeys" /><span>Cheat keys: Q/W/E/R/T</span></label>
          <label class="debug-row"><input type="checkbox" data-flag="invincible" /><span>Invincible</span></label>
          <label class="debug-row"><input type="checkbox" data-flag="patternTimer" /><span>Customer patience timer</span></label>
        </div>
      </details>

      <details class="debug-section">
        <summary>Display</summary>
        <div class="debug-section-body">
          <label class="debug-row"><input type="checkbox" data-flag="showHitboxes" /><span>Show hitboxes</span></label>
          <label class="debug-row"><input type="checkbox" data-flag="showFps" /><span>Show FPS</span></label>
          <label class="debug-field">Aspect:
            <select id="debugAspect">
              <option value="auto">Auto (fill screen)</option>
              <option value="3:4">3:4 (portrait)</option>
              <option value="9:16">9:16 (tall)</option>
              <option value="4:3">4:3 (landscape)</option>
              <option value="3:2">3:2 (35mm)</option>
              <option value="16:9">16:9 (wide)</option>
            </select>
          </label>
          <label class="debug-field">Touch:
            <select id="debugTouchScheme">
              <option value="relative">Relative drag</option>
              <option value="absolute">Drag (absolute)</option>
              <option value="holdzones">Hold zones</option>
            </select>
          </label>
        </div>
      </details>

      <details class="debug-section">
        <summary>Bubble management</summary>
        <div class="debug-section-body">
          <div class="debug-bubble-freq">
            Bubble gap (s):
            <input type="number" id="debugBubbleMin" min="0.2" step="0.5" title="min seconds between bubbles" />
            –
            <input type="number" id="debugBubbleMax" min="0.2" step="0.5" title="max seconds between bubbles" />
          </div>
          <div class="debug-bubble-weights">
            <span>Bubble mix:</span>
            <label>❤️<input type="number" id="debugWeightHeart" min="0" step="0.05" /></label>
            <label>⚡<input type="number" id="debugWeightSpeed" min="0" step="0.05" /></label>
            <label>❄️<input type="number" id="debugWeightPause" min="0" step="0.05" /></label>
            <label>🌈<input type="number" id="debugWeightRainbow" min="0" step="0.05" /></label>
          </div>
        </div>
      </details>

      <details class="debug-section">
        <summary>Difficulty</summary>
        <div class="debug-section-body">
          <div class="debug-bias">
            <label>Demand bias: <span id="debugBiasLabel">65%</span></label>
            <input type="range" id="debugBiasSlider" min="0" max="1" step="0.05" value="0.65" />
          </div>
          <div class="debug-patience">
            <label>Patience (s): <input type="number" id="debugPatienceInput" min="0" step="0.5" placeholder="ramp" /></label>
          </div>
        </div>
      </details>

      <details class="debug-section">
        <summary>Tutorial</summary>
        <div class="debug-section-body">
          <label class="debug-row">
            <input type="checkbox" id="debugTutorial" />
            <span>Force Wave 0 tutorial (every game)</span>
          </label>
        </div>
      </details>

      <button id="debugResume">Resume ▶</button>
    </div>
  </div>

  <div id="overlay">
    <h1>🍦 Poop in a Scoop 🍦</h1>
    <div class="menu-buttons">
      <button id="startBtn">▶ Start</button>
      <button id="howBtn" class="secondary">📋 How to Play</button>
      <button id="recipesBtn" class="secondary">📖 Recipes</button>
      <button id="challengesBtn" class="secondary">🎯 Challenges</button>
    </div>
    <p id="title-best"></p>
  </div>

  <div id="recipesOverlay" class="hidden">
    <div class="recipes-modal">
      <h2>📖 Recipe Book</h2>
      <div class="recipes-list"></div>
      <button id="closeRecipesBtn">Close</button>
    </div>
  </div>

  <div id="challengesOverlay" class="hidden">
    <div class="challenges-modal">
      <h2>🎯 Challenges</h2>
      <div class="challenges-list"></div>
      <button id="closeChallengesBtn">Close</button>
    </div>
  </div>

  <div id="challengeToast"></div>

  <div id="waveTransitionOverlay" class="hidden">
    <div class="wave-transition-modal">
      <h2 class="wt-title">Wave Complete</h2>
      <div class="wt-subtitle"></div>
      <div class="wt-challenges"></div>
      <div class="wt-rewards hidden"></div>
      <div class="wt-store hidden">
        <div class="wt-store-score"></div>
        <div class="wt-store-items">
          <button class="wt-heal-btn secondary"></button>
          <button class="wt-loot-btn secondary"></button>
        </div>
      </div>
      <div class="wt-buttons">
        <button class="wt-recipes-btn secondary">📖 Recipes</button>
        <button class="wt-play-btn"><span class="wt-play-label">Next Wave in 3…</span></button>
        <button class="wt-challenges-btn secondary">🎯 Challenges</button>
      </div>
    </div>
  </div>

  <div id="pauseOverlay" class="hidden">
    <div class="wave-transition-modal pause-modal">
      <h2 class="wt-title">Paused</h2>
      <div class="wt-subtitle">Tap Resume or press Esc to continue</div>
      <div class="wt-buttons">
        <button class="wt-recipes-btn secondary" id="pauseRecipesBtn">📖 Recipes</button>
        <button class="wt-play-btn" id="pauseResumeBtn">▶ Resume</button>
        <button class="wt-challenges-btn secondary" id="pauseChallengesBtn">🎯 Challenges</button>
      </div>
    </div>
  </div>

  <button id="pauseBtn" title="Pause (Esc)">⏸</button>
  <button id="fullscreenBtn" title="Fullscreen">⛶</button>
  <button id="settingsBtn" title="Settings">⚙️</button>
  <div id="settingsOverlay" class="hidden">
    <div class="settings-modal">
      <h2>⚙️ Settings</h2>
      <div class="settings-row">
        <label for="volumeSlider">Sound Effects</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="100" />
        <span id="volumeValue">100%</span>
      </div>
      <div class="settings-row settings-danger-row">
        <button id="resetProgressBtn" class="danger">Reset Challenges &amp; Recipes</button>
        <p class="settings-danger-note">Wipes all unlocks. This cannot be undone.</p>
      </div>
      <button id="closeSettingsBtn">Close</button>
    </div>
  </div>
  </div><!-- #stage -->

  <script type="module" src="js/game.js"></script>
</body>
</html>
